<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revues de Marché — Hebdomadaire</title>
  <meta name="description" content="Revues financières hebdomadaires — analyse macro, indices, taux, matières premières et conseils CIB.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f14;
      --bg2: #141820;
      --bg3: #1a1f2b;
      --card: #1a1f2b;
      --card-h: #222837;
      --border: #2a3040;
      --border-h: #3a4258;
      --gold: #c9a24e;
      --gold-l: #e0be6a;
      --gold-d: #a07e30;
      --blue: #4a8fd4;
      --green: #3dbd7d;
      --red: #d45555;
      --white: #f0f0f0;
      --white2: #c8ccd4;
      --white3: #8890a0;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --serif: 'Playfair Display', Georgia, serif;
      --r: 12px;
      --r2: 8px;
      --ease: cubic-bezier(.4, 0, .2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--white);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: rgba(12, 15, 20, .92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .7rem;
      text-decoration: none;
      color: var(--white);
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold-d));
      border-radius: var(--r2);
      display: grid;
      place-items: center;
      font-size: .9rem;
      font-weight: 700;
      color: var(--bg);
    }
    .logo-text {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .logo-sub {
      font-family: var(--sans);
      font-size: .65rem;
      color: var(--white3);
      text-transform: uppercase;
      letter-spacing: .15em;
      display: block;
      margin-top: -2px;
    }
    .header-right {
      font-size: .8rem;
      color: var(--white3);
    }
    .header-right strong {
      color: var(--gold);
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 4rem 2rem 2rem;
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
    }
    .hero h1 {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: .5rem;
      line-height: 1.3;
    }
    .hero h1 span {
      color: var(--gold);
    }
    .hero p {
      color: var(--white3);
      font-size: .95rem;
      margin-bottom: 2rem;
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }
    .search-wrap svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--white3);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: .8rem 2.5rem .8rem 2.7rem;
      font-family: var(--sans);
      font-size: .9rem;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      background: var(--bg3);
      color: var(--white);
      outline: none;
      transition: .25s var(--ease);
    }
    .search-wrap input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 162, 78, .15);
    }
    .search-wrap input::placeholder { color: var(--white3); }
    .search-clear {
      position: absolute;
      right: .8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--white3);
      cursor: pointer;
      font-size: 1.2rem;
      display: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      transition: .15s;
    }
    .search-clear.show { display: flex; }
    .search-clear:hover { background: var(--card-h); color: var(--white); }

    /* ── MONTHS NAV ── */
    .months-nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 2rem .5rem;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .months-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--white3);
      margin-right: .5rem;
    }
    .month-btn {
      padding: .4rem 1rem;
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      background: transparent;
      color: var(--white3);
      cursor: pointer;
      transition: .2s var(--ease);
    }
    .month-btn:hover {
      border-color: var(--border-h);
      color: var(--white2);
      background: var(--bg3);
    }
    .month-btn.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
      font-weight: 600;
    }
    .result-count {
      margin-left: auto;
      font-size: .8rem;
      color: var(--white3);
    }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 2rem 4rem;
    }

    /* ── MONTH GROUP ── */
    .month-group {
      margin-bottom: 2.5rem;
    }
    .month-title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .month-title .count-badge {
      font-family: var(--sans);
      font-size: .7rem;
      font-weight: 600;
      background: var(--gold);
      color: var(--bg);
      padding: .15rem .55rem;
      border-radius: 50px;
    }

    /* ── CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: .3s var(--ease);
      animation: fadeUp .5s var(--ease) both;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      border-color: var(--gold-d);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.4);
    }

    .card-accent {
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-d));
    }

    .card-body {
      padding: 1.3rem 1.3rem .8rem;
      flex: 1;
    }
    .card-date {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--gold);
      margin-bottom: .4rem;
      font-weight: 600;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: .6rem;
      color: var(--white);
    }
    .card-desc {
      font-size: .85rem;
      color: var(--white3);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      padding: .6rem 1.3rem;
      display: flex;
      flex-wrap: wrap;
      gap: .8rem;
      font-size: .75rem;
      color: var(--white3);
      border-top: 1px solid var(--border);
    }
    .card-meta span {
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .card-meta svg {
      width: 12px;
      height: 12px;
      opacity: .5;
    }

    .card-actions {
      padding: .8rem 1.3rem 1.2rem;
      display: flex;
      gap: .5rem;
    }
    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .35rem;
      padding: .55rem .8rem;
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 500;
      border-radius: var(--r2);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: .2s var(--ease);
    }
    .btn svg { width: 14px; height: 14px; }
    .btn-gold {
      background: var(--gold);
      color: var(--bg);
    }
    .btn-gold:hover {
      background: var(--gold-l);
    }
    .btn-outline {
      background: transparent;
      color: var(--white3);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover {
      border-color: var(--border-h);
      color: var(--white);
      background: var(--bg3);
    }

    /* ── TAGS ── */
    .card-tags {
      padding: 0 1.3rem .6rem;
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
    }
    .tag {
      font-size: .68rem;
      font-weight: 500;
      padding: .2rem .55rem;
      border-radius: 50px;
      background: rgba(201, 162, 78, .1);
      color: var(--gold);
      border: 1px solid rgba(201, 162, 78, .2);
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--white3);
    }
    .empty-icon { font-size: 3rem; opacity: .3; margin-bottom: .8rem; }
    .empty h3 { font-size: 1.1rem; color: var(--white2); margin-bottom: .3rem; }
    .empty p { font-size: .9rem; }

    /* ── FOOTER ── */
    .footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
    }
    .footer-brand {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--white2);
      margin-bottom: .2rem;
    }
    .footer-sub {
      font-size: .72rem;
      color: var(--white3);
      opacity: .6;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .header-inner { padding: .8rem 1.2rem; }
      .header-right { display: none; }
      .hero { padding: 2.5rem 1.2rem 1.5rem; }
      .hero h1 { font-size: 1.6rem; }
      .months-nav, .main { padding-left: 1.2rem; padding-right: 1.2rem; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo">
        <div class="logo-icon">RM</div>
        <div>
          <span class="logo-text">Revues de Marché</span>
          <span class="logo-sub">Analyse hebdomadaire</span>
        </div>
      </a>
      <div class="header-right"><strong id="total-count">—</strong> revues publiées</div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Analyse <span>Hebdomadaire</span> des Marchés</h1>
    <p>Macro, indices, taux, matières premières & conseils CIB — chaque semaine.</p>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Rechercher... (ex: Intel, Ormuz, Fed)" autocomplete="off" spellcheck="false">
      <button id="search-clear" class="search-clear" aria-label="Effacer">&times;</button>
    </div>
  </section>

  <!-- MONTHS NAV -->
  <nav class="months-nav" id="months-nav"></nav>

  <!-- MAIN -->
  <main class="main" id="main"></main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-brand">Revues de Marché</div>
    <div class="footer-sub">Objectif BNP CIB — Equity Capital Markets &middot; Document à titre informatif uniquement</div>
  </footer>

<script>
(function() {
  // ══════════════════════════════════════════
  //  DATA — exact filenames matching GitHub repo
  // ══════════════════════════════════════════
  var docs = [
    {
      id: 1,
      titre: "Revue Marché — 5 Avril 2026",
      date: "2026-04-05",
      fichier: "Revue_Marche_05_Avril_2026.pdf",
      pages: 6,
      taille: "1.2 Mo",
      tags: ["Ormuz", "Pétrole", "Fed", "Or"],
      desc: "Conflit Iran–États-Unis et perturbation du détroit d'Ormuz. Envolée du pétrole. Emploi américain au-dessus des attentes. Fed en pause. Or à un nouveau record historique. Rebond technique des indices."
    },
    {
      id: 2,
      titre: "Revue Marché — 10 Avril 2026",
      date: "2026-04-10",
      fichier: "Revue_Marche_10_Avril_2026.pdf",
      pages: 6,
      taille: "75 Ko",
      tags: ["Cessez-le-feu", "CAC 40", "PEA", "Résultats Q1"],
      desc: "Cessez-le-feu Iran–États-Unis et rebond historique du CAC. Focus PEA et réforme du Budget 2026. Ouverture de la saison des résultats du premier trimestre."
    },
    {
      id: 3,
      titre: "Revue Marché — 17 Avril 2026",
      date: "2026-04-17",
      fichier: "Revue_Marche_17_Avril_2026.pdf",
      pages: 8,
      taille: "1.5 Mo",
      tags: ["Ormuz", "JPM", "Citi", "Or", "Alstom", "Fed"],
      desc: "Choc Ormuz et chute du pétrole en séance. Résultats bancaires américains record (JPM, Citi). Or à $4 879/oz. Ton hawkish de la Fed. Effondrement d'Alstom -27%. Trêve fragile."
    },
    {
      id: 4,
      titre: "Revue Marché — 25 Avril 2026",
      date: "2026-04-25",
      fichier: "Revue_Marche_25_Avril_2026.pdf",
      pages: 9,
      taille: "1.8 Mo",
      tags: ["Intel", "Tesla", "Warsh", "Ormuz", "Or", "CIB/ECM"],
      desc: "Trêve Ormuz prolongée sine die mais détroit fermé. Intel +23,6% — star de la semaine. Tesla Q1 mitigé. Audition Warsh au Sénat. CAC 40 −3,2%. Brent >$105/b. Or record $4 732/oz. 3 conseils CIB/ECM/IPO."
    }
  ];

  // ══════════════════════════════════════════
  //  HELPERS
  // ══════════════════════════════════════════
  var moisFR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  function formatDate(s) {
    var d = new Date(s);
    return d.getDate() + ' ' + moisFR[d.getMonth()].toLowerCase() + ' ' + d.getFullYear();
  }

  function getMonthKey(s) {
    var d = new Date(s);
    return moisFR[d.getMonth()] + ' ' + d.getFullYear();
  }

  function normalize(s) {
    return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  }

  // SVG icons
  var icons = {
    open: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
    dl: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    cal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    pg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    sz: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };

  // ══════════════════════════════════════════
  //  STATE & ELEMENTS
  // ══════════════════════════════════════════
  var activeMonth = 'Tous';
  var searchQuery = '';
  var searchEl = document.getElementById('search');
  var searchClear = document.getElementById('search-clear');
  var navEl = document.getElementById('months-nav');
  var mainEl = document.getElementById('main');

  document.getElementById('total-count').textContent = docs.length;

  // ══════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════
  function render() {
    // Get unique months
    var monthSet = new Set();
    docs.forEach(function(d) { monthSet.add(getMonthKey(d.date)); });
    var months = ['Tous'].concat(Array.from(monthSet).sort(function(a, b) {
      return new Date('1 ' + b) - new Date('1 ' + a);
    }));

    // Build nav
    var navHTML = '<span class="months-label">Période</span>';
    months.forEach(function(m) {
      navHTML += '<button class="month-btn' + (m === activeMonth ? ' active' : '') + '" data-month="' + m + '">' + m + '</button>';
    });
    navHTML += '<span class="result-count" id="result-count"></span>';
    navEl.innerHTML = navHTML;

    navEl.querySelectorAll('.month-btn').forEach(function(btn) {
      btn.onclick = function() {
        activeMonth = this.dataset.month;
        render();
      };
    });

    // Filter docs
    var q = normalize(searchQuery.trim());
    var filtered = docs.filter(function(d) {
      // Month filter
      if (activeMonth !== 'Tous' && getMonthKey(d.date) !== activeMonth) return false;
      // Search filter
      if (q) {
        var haystack = normalize(d.titre + ' ' + d.desc + ' ' + d.tags.join(' '));
        var words = q.split(/\s+/);
        for (var i = 0; i < words.length; i++) {
          if (haystack.indexOf(words[i]) === -1) return false;
        }
      }
      return true;
    });

    // Sort newest first
    filtered.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

    // Result count
    var rc = document.getElementById('result-count');
    if (rc) {
      rc.textContent = (activeMonth !== 'Tous' || q)
        ? filtered.length + ' revue' + (filtered.length !== 1 ? 's' : '')
        : '';
    }

    // Empty state
    if (!filtered.length) {
      mainEl.innerHTML = '<div class="empty"><div class="empty-icon">📄</div><h3>Aucune revue trouvée</h3><p>Essayez un autre mot-clé ou changez de période.</p></div>';
      return;
    }

    // Group by month
    var groups = {};
    filtered.forEach(function(d) {
      var key = getMonthKey(d.date);
      if (!groups[key]) groups[key] = [];
      groups[key].push(d);
    });

    // Build HTML
    var html = '';
    Object.keys(groups).forEach(function(month) {
      var items = groups[month];
      html += '<section class="month-group">';
      html += '<h2 class="month-title">' + month + ' <span class="count-badge">' + items.length + '</span></h2>';
      html += '<div class="cards-grid">';

      items.forEach(function(d, i) {
        html += '<article class="card" style="animation-delay:' + (i * .08) + 's">';
        html += '<div class="card-accent"></div>';
        html += '<div class="card-body">';
        html += '<div class="card-date">' + icons.cal + ' ' + formatDate(d.date) + '</div>';
        html += '<h3 class="card-title">' + d.titre + '</h3>';
        html += '<p class="card-desc">' + d.desc + '</p>';
        html += '</div>';

        // Tags
        html += '<div class="card-tags">';
        d.tags.forEach(function(t) {
          html += '<span class="tag">' + t + '</span>';
        });
        html += '</div>';

        // Meta
        html += '<div class="card-meta">';
        html += '<span>' + icons.pg + ' ' + d.pages + ' pages</span>';
        html += '<span>' + icons.sz + ' ' + d.taille + '</span>';
        html += '</div>';

        // Actions
        html += '<div class="card-actions">';
        html += '<a href="' + d.fichier + '" target="_blank" rel="noopener" class="btn btn-gold">' + icons.open + ' Consulter</a>';
        html += '<a href="' + d.fichier + '" download class="btn btn-outline">' + icons.dl + ' Télécharger</a>';
        html += '</div>';

        html += '</article>';
      });

      html += '</div></section>';
    });

    mainEl.innerHTML = html;
  }

  // ══════════════════════════════════════════
  //  EVENTS
  // ══════════════════════════════════════════
  searchEl.addEventListener('input', function() {
    searchQuery = this.value;
    searchClear.classList.toggle('show', searchQuery.length > 0);
    render();
  });

  searchClear.addEventListener('click', function() {
    searchEl.value = '';
    searchQuery = '';
    searchClear.classList.remove('show');
    searchEl.focus();
    render();
  });

  // Initial render
  render();
})();
</script>
</body>
</html>
